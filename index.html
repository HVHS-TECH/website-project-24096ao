<!--java script for carosell-->
    <script>
        //amount of slides
        let slideIndex = 1;
        //shows what slide you are on
        showSlides(slideIndex);

        //chages slides whenever prev or next is clicked
        function plusSlides(n) {
           showSlides(slideIndex += n);
        }

       //current slide based on what user clicked
        function currentSlide(n) {
           showSlides(slideIndex = n);
        }

        //Show slides
        function showSlides(n) {
        let i;
            
        //gets the information from each div
        let slides = document.getElementsByClassName("Inside");
        let dots = document.getElementsByClassName("dot");
            
        //what slide dislayes in relation to what the user clicked
        if (n > slides.length) {slideIndex = 1}    
        if (n < 1) {slideIndex = slides.length}
            
        //hides all other slides
        for (i = 0; i < slides.length; i++) {                
            slides[i].style.display = "none";  
        }
            
        //Makes the dot be active when its on its correct slide
        for (i = 0; i < dots.length; i++) {
            dots[i].className = dots[i].className.replace(" active", "");
        }
            
        //dislay slides and dots
        slides[slideIndex-1].style.display = "block";  
        dots[slideIndex-1].className += " active";
        }
    </script>
